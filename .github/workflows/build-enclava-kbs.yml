name: Build and Push Enclava KBS Image

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-kbs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push KBS image
        run: |
          docker buildx build --provenance false \
            --platform linux/amd64 \
            -f kbs/docker/coco-as-grpc/Dockerfile \
            --build-arg BUILDPLATFORM=linux/amd64 \
            --build-arg ARCH=x86_64 \
            --push \
            -t ghcr.io/enclava-ai/trustee-kbs-grpc-as:${{ steps.tag.outputs.tag }} \
            -t ghcr.io/enclava-ai/trustee-kbs-grpc-as:latest \
            .
